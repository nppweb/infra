name: Production Deploy

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Repository that triggered deploy"
        required: true
        default: infra
        type: choice
        options:
          - infra
          - npp-web
          - npp-backend
          - processing-worker
          - scrape-helper
          - contracts
      branch:
        description: "Git branch to deploy on the server"
        required: true
        default: main
      target_sha:
        description: "Optional commit SHA from CI for traceability"
        required: false
        default: ""
      services:
        description: "Optional comma-separated docker compose services override"
        required: false
        default: ""
      auto_rollback:
        description: "Rollback automatically if deploy or health checks fail"
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      repo_name:
        description: "Repository that triggered deploy"
        required: true
        type: string
      branch:
        description: "Git branch to deploy on the server"
        required: false
        default: main
        type: string
      target_sha:
        description: "Optional commit SHA from CI for traceability"
        required: false
        default: ""
        type: string
      services:
        description: "Optional comma-separated docker compose services override"
        required: false
        default: ""
        type: string
      auto_rollback:
        description: "Rollback automatically if deploy or health checks fail"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Resolve deploy parameters
        id: params
        env:
          INPUT_REPO_NAME: ${{ inputs.repo_name }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_TARGET_SHA: ${{ inputs.target_sha }}
          INPUT_SERVICES: ${{ inputs.services }}
          INPUT_AUTO_ROLLBACK: ${{ inputs.auto_rollback }}
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            repo_name="infra"
            branch="${GITHUB_REF_NAME}"
            target_sha="${GITHUB_SHA}"
            services=""
            auto_rollback="true"
          else
            repo_name="${INPUT_REPO_NAME:-infra}"
            branch="${INPUT_BRANCH:-main}"
            target_sha="${INPUT_TARGET_SHA:-}"
            services="${INPUT_SERVICES:-}"
            auto_rollback="${INPUT_AUTO_ROLLBACK:-true}"
          fi

          {
            echo "repo_name=${repo_name}"
            echo "branch=${branch}"
            echo "target_sha=${target_sha}"
            echo "services=${services}"
            echo "auto_rollback=${auto_rollback}"
          } >>"$GITHUB_OUTPUT"

          echo "Resolved deploy target: repo=${repo_name}, branch=${branch}, sha=${target_sha:-n/a}, services=${services:-default}"

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT_INPUT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail

          [[ -n "${SSH_HOST}" ]] || { echo "SSH_HOST secret is required"; exit 1; }
          [[ -n "${SSH_USER}" ]] || { echo "SSH_USER secret is required"; exit 1; }
          [[ -n "${SSH_PRIVATE_KEY}" ]] || { echo "SSH_PRIVATE_KEY secret is required"; exit 1; }

          ssh_port="${SSH_PORT_INPUT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${ssh_port}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Run deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT_INPUT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH_INPUT: ${{ secrets.DEPLOY_PATH }}
          REPO_NAME: ${{ steps.params.outputs.repo_name }}
          BRANCH: ${{ steps.params.outputs.branch }}
          TARGET_SHA: ${{ steps.params.outputs.target_sha }}
          SERVICES: ${{ steps.params.outputs.services }}
          AUTO_ROLLBACK: ${{ steps.params.outputs.auto_rollback }}
        run: |
          set -Eeuo pipefail

          ssh_port="${SSH_PORT_INPUT:-22}"
          deploy_path="${DEPLOY_PATH_INPUT:-/home/deploy}"

          ssh -p "${ssh_port}" "${SSH_USER}@${SSH_HOST}" bash -s -- \
            "${REPO_NAME}" \
            "${BRANCH}" \
            "${TARGET_SHA}" \
            "${SERVICES}" \
            "${AUTO_ROLLBACK}" \
            "${deploy_path}" <<'EOF'
          set -Eeuo pipefail

          repo_name="$1"
          branch="$2"
          target_sha="$3"
          services="$4"
          auto_rollback="$5"
          deploy_path="$6"

          args=(--repo "$repo_name" --branch "$branch")

          if [[ -n "$target_sha" ]]; then
            args+=(--sha "$target_sha")
          fi

          if [[ -n "$services" ]]; then
            args+=(--services "$services")
          fi

          if [[ "$auto_rollback" != "true" ]]; then
            args+=(--no-auto-rollback)
          fi

          export DEPLOY_PATH="$deploy_path"
          cd "$deploy_path/infra"
          ./scripts/deploy.sh "${args[@]}"
          EOF
